<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ILIOS-HR — Human Resource Management System</title>
  <meta name="description"
    content="ILIOS-HR Management System — Manage leave, attendance, employees, and recruitment all in one place.">
  <meta name="theme-color" content="#0f0c29">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/modules.css">

  <!-- Favicon (inline SVG) -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>

<body>

  <!-- ====== Ambient Background ====== -->
  <div class="ambient-bg"></div>

  <!-- ====== Login Screen ====== -->
  <div class="login-screen" id="login-screen">
    <div class="login-bg"></div>
    <div class="login-card">
      <div class="login-logo">
        <h1>ILIOS-HR</h1>
        <p>Human Resource Management System</p>
      </div>

      <!-- Auth Tabs -->
      <div class="auth-tabs"
        style="display:flex;gap:var(--sp-1);padding:3px;background:rgba(255,255,255,0.04);border-radius:var(--radius-md);margin-bottom:var(--sp-5)">
        <button class="tab active" id="tab-signin" onclick="App.switchAuthTab('signin')" type="button"
          style="flex:1">Sign In</button>
        <button class="tab" id="tab-signup" onclick="App.switchAuthTab('signup')" type="button" style="flex:1">Sign
          Up</button>
      </div>

      <!-- Sign In Form -->
      <form class="login-form" id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input class="form-input" type="email" id="login-email" placeholder="your.name@ilios.io"
            autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-input" type="password" id="login-password" placeholder="Enter your password"
            autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:var(--sp-4)">
          Sign In
        </button>
        <div style="text-align:center;margin-top:var(--sp-4)">
          <button type="button" class="btn btn-ghost text-sm" id="demo-login-btn">
            🚀 Quick Demo Login
          </button>
        </div>
      </form>

      <!-- Sign Up Form -->
      <form class="login-form" id="signup-form" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input class="form-input" type="text" id="signup-name" placeholder="Enter your full name" autocomplete="name"
            required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input class="form-input" type="email" id="signup-email" placeholder="your.name@ilios.io"
            autocomplete="email" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4)">
          <div class="form-group">
            <label>Department</label>
            <select class="form-select" id="signup-dept">
              <option value="HR">HR</option>
              <option value="Engineering">Engineering</option>
              <option value="Design">Design</option>
              <option value="Marketing">Marketing</option>
              <option value="Sales">Sales</option>
              <option value="Finance">Finance</option>
            </select>
            <input class="form-input" id="signup-dept-custom" placeholder="Or type custom" style="margin-top:var(--sp-1)">
          </div>
          <div class="form-group">
            <label>Role / Title</label>
            <input class="form-input" type="text" id="signup-role" placeholder="e.g. HR Manager">
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-input" type="password" id="signup-password" placeholder="Create a password"
            autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input class="form-input" type="password" id="signup-confirm" placeholder="Confirm your password"
            autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:var(--sp-4)">
          Create Account
        </button>
      </form>

      <!-- Theme toggle on login -->
      <div
        style="text-align:center;margin-top:var(--sp-4);padding-top:var(--sp-3);border-top:1px solid var(--glass-border)">
        <button type="button" class="btn btn-ghost text-xs" onclick="App.toggleTheme()" id="login-theme-toggle">
          🌙 Switch to Light Mode
        </button>
      </div>
    </div>
  </div>

  <!-- ====== Toast Container ====== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ====== Sidebar ====== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand-icon">⚡</div>
      <span class="sidebar-brand">ILIOS-HR</span>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>

      <a class="sidebar-link active" data-route="dashboard" href="#dashboard" id="nav-dashboard">
        <span class="icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a class="sidebar-link" data-route="leave" href="#leave" id="nav-leave">
        <span class="icon">🏖️</span>
        <span>Leave Management</span>
        <span class="badge" id="leave-badge" style="display:none">0</span>
      </a>
      <a class="sidebar-link" data-route="attendance" href="#attendance" id="nav-attendance">
        <span class="icon">⏰</span>
        <span>Attendance</span>
      </a>

      <div class="sidebar-section-label">Organization</div>

      <a class="sidebar-link" data-route="employees" href="#employees" id="nav-employees">
        <span class="icon">👥</span>
        <span>Employees</span>
      </a>
      <a class="sidebar-link" data-route="recruitment" href="#recruitment" id="nav-recruitment">
        <span class="icon">💼</span>
        <span>Recruitment</span>
      </a>

      <div class="sidebar-section-label">Account</div>

      <a class="sidebar-link" data-route="profile" href="#profile" id="nav-profile">
        <span class="icon">👤</span>
        <span>My Profile</span>
      </a>
      <a class="sidebar-link admin-only" data-route="admin" href="#admin" id="nav-admin">
        <span class="icon">🛡️</span>
        <span>Admin Panel</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="Router.navigate('profile')">
        <div class="avatar" style="background:#10b981;width:32px;height:32px;font-size:12px">AG</div>
        <div class="user-info">
          <div style="font-size:var(--text-sm);font-weight:600">ILIOS-HR</div>
          <div style="font-size:var(--text-xs);color:var(--text-tertiary)">HR System</div>
        </div>
      </div>
      <button class="btn btn-ghost text-xs" onclick="App.logout()" style="width:100%;margin-top:var(--sp-2);color:var(--danger-400)">
        🚪 Sign Out
      </button>
    </div>
  </aside>

  <!-- ====== Top Bar ====== -->
  <header class="topbar" id="topbar">
    <div class="topbar-left">
      <h2 class="topbar-title" id="topbar-title">Dashboard</h2>
    </div>
    <div class="topbar-right">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search anything..." id="global-search">
      </div>
      <button class="theme-toggle" id="theme-toggle-btn" onclick="App.toggleTheme()" title="Toggle theme">
        <span id="theme-icon">🌙</span>
      </button>
      <button class="notif-btn" id="notif-btn" title="Notifications">
        🔔
        <span class="notif-dot"></span>
      </button>
      <div class="avatar" id="topbar-avatar" style="background:#10b981;cursor:pointer" title="HR Manager"
        onclick="Router.navigate('profile')">AG</div>
    </div>
  </header>

  <!-- ====== Main Content ====== -->
  <main class="main-content" id="main-content" style="transition: opacity 0.15s ease, transform 0.15s ease;">
    <!-- Content injected by router -->
  </main>

  <!-- ====== Scripts ====== -->
  <script src="js/store.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/leave.js"></script>
  <script src="js/attendance.js"></script>
  <script src="js/employees.js"></script>
  <script src="js/recruitment.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
